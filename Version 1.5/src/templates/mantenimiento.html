<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro | Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .maintenance-icon { font-size: 80px; color: var(--error-500); margin-bottom: 20px; }
        h1 { font-family: 'Anton', sans-serif; font-size: 48px; letter-spacing: 2px; }
        h1 span { color: var(--error-500); }
        p { color: #a0a0a0; font-size: 18px; }
        .progress-bar-container { width: 300px; height: 4px; background: #2d2d2d; border-radius: 2px; margin: 20px auto; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--error-500), var(--warning-500)); border-radius: 2px; animation: loading 2s ease-in-out infinite; width: 30%; }
        @keyframes loading { 0% { width: 0; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0; margin-left: 100%; } }
    </style>
</head>
<body>
    <div>
        <div class="maintenance-icon">
            <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="36" fill="none" stroke="#e63946" stroke-width="4"/>
                <path d="M40 20 L40 45 M40 55 L40 58" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>STOCK<span>PRO</span></h1>
        <p style="font-size:22px;font-weight:500;margin-bottom:4px;">Nos encontramos en mantenimiento</p>
        <p style="color: #a0a0a0; font-size: 15px;">Estamos realizando mejoras para ofrecerte un mejor servicio.</p>
        <p style="color: #6c757d; font-size: 13px; margin-top:4px;">Disculpa las molestias, vuelve pronto.</p>
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
        <small style="color: #6c757d;">Estamos realizando mejoras. Vuelve pronto.</small>
    </div>
</body>
</html>
