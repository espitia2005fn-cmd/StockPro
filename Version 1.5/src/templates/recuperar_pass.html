{% extends "base_auth.html" %}

{% block titulo %}Recuperar Contraseña{% endblock %}

{% block logo_icon %}<i class="bi bi-key-fill"></i>{% endblock %}

{% block subtitulo %}Recuperar contraseña{% endblock %}

{% block contenido %}
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope"></i> Correo electrónico</label>
        <input type="email" name="email" class="form-control" placeholder="tu@email.com" required autofocus>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-shield-lock"></i> Verificaci&oacute;n: &iquest;Cu&aacute;nto es {{ captcha_q }}?</label>
        <input type="text" name="_captcha" class="form-control" placeholder="Escribe la respuesta" required>
    </div>

    <button type="submit" class="btn-brand mb-3">
        Enviar enlace de recuperaci&oacute;n
    </button>
    <div class="text-center">
        <a href="/login" class="auth-link">
            <i class="bi bi-arrow-left"></i> Volver al inicio de sesi&oacute;n
        </a>
    </div>
</form>
{% endblock %}

{% block extra_js %}

{% endblock %}
