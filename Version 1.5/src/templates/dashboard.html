{% extends "base_admin.html" %}

{% block titulo %}Dashboard{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
    <div>
        <p class="page-subtitle">Resumen ejecutivo del negocio</p>
    </div>
    <div class="d-flex gap-2 align-items-center">
        <span class="badge badge-brand" id="fecha-hoy"></span>
        <button class="btn btn-secondary btn-sm" onclick="fetch('/admin/cache/limpiar',{method:'POST',headers:{'X-CSRFToken':getCSRFToken()}}).then(function(){cargarDashboard()})">
            <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
    </div>
</div>

<div id="kpis-container" class="mb-4"></div>

<div class="row g-4 mb-5">
    <div class="col-lg-12">
        <div class="d-flex gap-4 flex-wrap">
            <div class="chart-container flex-fill" style="min-width:350px;">
                <div class="chart-header">
                    <h5 class="chart-title">Ventas &uacute;ltimos 12 meses</h5>
                </div>
                <div id="ventasChart" style="height:320px;"></div>
            </div>
            <div class="chart-container flex-fill" style="min-width:250px;max-width:350px;">
                <div class="chart-header">
                    <h5 class="chart-title">Top Categor&iacute;as</h5>
                </div>
                <div id="categoriaChart" style="height:300px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 mb-4">
    <div class="col-lg-12">
        <div class="d-flex gap-4 flex-wrap">
            <div class="table-container flex-fill" style="min-width:300px;">
                <div class="table-header">
                    <h5 class="card-title">Movimientos Recientes</h5>
                    <a href="/movimientos" class="btn btn-sm btn-secondary">Ver todos</a>
                </div>
                <div class="table-wrapper">
                    <table class="table table-sm table-hover mb-0">
                        <thead><tr><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Fecha</th></tr></thead>
                        <tbody id="movimientos-recientes"><tr><td colspan="4" class="text-center text-muted small py-4">Cargando...</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div class="table-container flex-fill" style="min-width:300px;">
                <div class="table-header">
                    <h5 class="card-title">Stock Cr&iacute;tico</h5>
                    <span class="badge badge-error" id="stock-critico-badge">0</span>
                </div>
                <div class="table-wrapper">
                    <table class="table table-sm table-hover mb-0">
                        <thead><tr><th>Producto</th><th>Stock</th><th>M&iacute;nimo</th></tr></thead>
                        <tbody id="stock-critico-body"><tr><td colspan="3" class="text-center text-muted small py-4">Cargando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-detalle">
    <div class="modal-content" style="max-width:800px;">
        <div class="modal-header">
            <h5 class="modal-title" id="modal-titulo"></h5>
            <button class="modal-close" onclick="cerrarModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body" style="max-height:60vh;overflow-y:auto;"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
var COLORS = ['#465fff','#12b76a','#f79009','#f04438','#7a5af8','#0dcaf0','#d63384','#6f42c1','#fd7e14','#20c997'];

var modalTitulos = {
    ventas_hoy: 'Ventas de Hoy',
    ventas_mes: 'Ventas del Mes',
    stock_critico: 'Stock Cr&iacute;tico',
    clientes_nuevos: 'Clientes Nuevos Hoy',
    salud_stock: 'Salud del Inventario'
};

function abrirModal(tipo) {
    var overlay = document.getElementById('modal-detalle');
    document.getElementById('modal-titulo').innerHTML = modalTitulos[tipo] || 'Detalle';
    document.getElementById('modal-body').innerHTML = '<p class="text-muted text-center py-4">Cargando...</p>';
    overlay.classList.add('show');
    fetch('/api/dashboard/detalle/' + tipo)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var html = '';
            if (tipo === 'ventas_hoy') {
                if (!data.length) { html = '<p class="text-muted text-center py-4">Sin ventas hoy</p>'; }
                else {
                    html = '<table class="table"><thead><tr><th>Factura</th><th>Cliente</th><th>Total</th><th>Pago</th><th>Estado</th><th>Hora</th></tr></thead><tbody>';
                    data.forEach(function(r) { html += '<tr><td>'+r.factura+'</td><td>'+r.cliente+'</td><td>$'+r.total+'</td><td>'+r.metodo_pago+'</td><td><span class="badge '+ (r.estado==='pagado'||r.estado==='entregado'?'badge-success':'badge-warning') +'">'+r.estado+'</span></td><td>'+r.hora+'</td></tr>'; });
                    html += '</tbody></table>';
                }
            } else if (tipo === 'ventas_mes') {
                html = '<div class="d-flex gap-3 mb-3"><div class="stat-card p-3 flex-fill text-center"><p class="stat-label">Total</p><h3 class="stat-value">$'+data.total_ventas+'</h3></div><div class="stat-card p-3 flex-fill text-center"><p class="stat-label">Pedidos</p><h3 class="stat-value">'+data.total_pedidos+'</h3></div></div>';
                if (data.dias && data.dias.length) {
                    html += '<table class="table"><thead><tr><th>Fecha</th><th>Pedidos</th><th>Subtotal</th></tr></thead><tbody>';
                    data.dias.forEach(function(d) { html += '<tr><td>'+d.fecha+'</td><td>'+d.cantidad+'</td><td>$'+d.subtotal+'</td></tr>'; });
                    html += '</tbody></table>';
                } else { html += '<p class="text-muted text-center py-3">Sin datos este mes</p>'; }
            } else if (tipo === 'stock_critico') {
                if (!data.length) { html = '<p class="text-muted text-center py-4">No hay stock cr&iacute;tico</p>'; }
                else {
                    html = '<table class="table"><thead><tr><th>C&oacute;digo</th><th>Producto</th><th>Stock</th><th>M&iacute;nimo</th><th>Faltan</th></tr></thead><tbody>';
                    data.forEach(function(r) { html += '<tr><td>'+r.codigo+'</td><td>'+r.nombre+'</td><td><span class="badge '+ (r.cantidad<=0?'badge-error':'badge-warning') +'">'+r.cantidad+'</span></td><td>'+r.stock_minimo+'</td><td class="text-danger fw-bold">'+r.faltan+'</td></tr>'; });
                    html += '</tbody></table>';
                }
            } else if (tipo === 'clientes_nuevos') {
                if (!data.length) { html = '<p class="text-muted text-center py-4">No hay clientes nuevos hoy</p>'; }
                else {
                    html = '<table class="table"><thead><tr><th>Usuario</th><th>Nombre</th><th>Email</th><th>Tel&eacute;fono</th><th>Hora</th></tr></thead><tbody>';
                    data.forEach(function(r) { html += '<tr><td>'+r.username+'</td><td>'+r.nombre+'</td><td>'+r.email+'</td><td>'+r.telefono+'</td><td>'+r.hora+'</td></tr>'; });
                    html += '</tbody></table>';
                }
            } else if (tipo === 'salud_stock') {
                if (data.grupos) {
                    html = '<div class="d-flex gap-3 mb-3">';
                    html += '<div class="stat-card p-3 flex-fill text-center"><p class="stat-label text-success">Optimo</p><h3 class="stat-value text-success">'+data.pct_optimo+'%</h3><small>'+ (data.grupos.optimo?.length||0) +'</small></div>';
                    html += '<div class="stat-card p-3 flex-fill text-center"><p class="stat-label text-warning">Bajo</p><h3 class="stat-value text-warning">'+data.pct_bajo+'%</h3><small>'+ (data.grupos.bajo?.length||0) +'</small></div>';
                    html += '<div class="stat-card p-3 flex-fill text-center"><p class="stat-label text-danger">Critico</p><h3 class="stat-value text-danger">'+data.pct_critico+'%</h3><small>'+ (data.grupos.critico?.length||0) +'</small></div>';
                    html += '</div>';
                    ['optimo','bajo','critico'].forEach(function(nivel) {
                        var items = data.grupos[nivel] || [];
                        if (items.length) {
                            html += '<h6 class="mb-2 text-uppercase text-muted small fw-bold">'+nivel+' ('+items.length+')</h6>';
                            html += '<table class="table table-sm mb-3"><thead><tr><th>Producto</th><th>Stock</th><th>M&iacute;nimo</th></tr></thead><tbody>';
                            items.forEach(function(p) { html += '<tr><td>'+escHtml(p.nombre)+'</td><td>'+p.cantidad+'</td><td>'+p.stock_minimo+'</td></tr>'; });
                            html += '</tbody></table>';
                        }
                    });
                } else { html = '<p class="text-muted text-center py-4">Sin datos</p>'; }
            }
            document.getElementById('modal-body').innerHTML = html;
        })
        .catch(function() {
            document.getElementById('modal-body').innerHTML = '<p class="text-danger text-center py-4">Error al cargar datos</p>';
        });
}

function cerrarModal() {
    document.getElementById('modal-detalle').classList.remove('show');
}

document.getElementById('modal-detalle').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
});

function crearEChart(id, option) {
    var cont = document.getElementById(id);
    if (!cont) return null;
    var instance = echarts.getInstanceByDom(cont);
    if (instance) instance.dispose();
    instance = echarts.init(cont);
    instance.setOption(option);
    return instance;
}

window.addEventListener('resize', function() {
    document.querySelectorAll('[id$="Chart"]').forEach(function(el) {
        var inst = echarts.getInstanceByDom(el);
        if (inst) inst.resize();
    });
});

function cargarDashboard() {
    fetch('/api/dashboard')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { console.error(data.error); return; }
            document.getElementById('fecha-hoy').textContent = data.fecha_hoy;
            var kpis = [
                {label:'Ventas Hoy', value:data.ventas_hoy_count, sub:'$'+data.ventas_hoy_valor, tipo:'ventas_hoy', icon:'bi-graph-up', bg:'#e8f0ff', color:'#465fff'},
                {label:'Ventas del Mes', value:data.ventas_mes_count, sub:'$'+data.ventas_mes_valor, tipo:'ventas_mes', icon:'bi-calendar-check', bg:'#e8fce8', color:'#12b76a'},
                {label:'Stock Cr&iacute;tico', value:data.stock_critico, sub:'Reponer urgente', tipo:'stock_critico', icon:'bi-exclamation-triangle', bg:'#fce8e8', color:'#f04438'},
                {label:'Clientes Nuevos', value:data.clientes_nuevos, sub:'Hoy', tipo:'clientes_nuevos', icon:'bi-person-plus', bg:'#e8f4f8', color:'#0dcaf0'},
                {label:'Salud Stock', value:data.salud_stock+'%', sub:data.salud_label, tipo:'salud_stock', icon:'bi-heart-pulse', bg:'#fff3e0', color:'#f79009'}
            ];
            document.getElementById('kpis-container').innerHTML = '<div class="d-flex gap-3 flex-wrap">' + kpis.map(function(k) {
                return '<div class="stat-card d-flex align-items-center gap-3 flex-fill" style="cursor:pointer;min-width:180px;" onclick="abrirModal(\''+k.tipo+'\')"><div style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:'+k.bg+';color:'+k.color+';flex-shrink:0;"><i class="bi '+k.icon+'"></i></div><div><p class="stat-label mb-0">'+k.label+'</p><h3 class="stat-value mb-0">'+k.value+'</h3><small class="text-muted">'+k.sub+'</small></div></div>';
            }).join('') + '</div>';
            document.getElementById('stock-critico-badge').textContent = data.stock_critico;
            var movBody = document.getElementById('movimientos-recientes');
            if (data.movimientos && data.movimientos.length) {
                movBody.innerHTML = data.movimientos.slice(0,5).map(function(m) { return '<tr><td>'+escHtml(m.producto)+'</td><td>'+escHtml(m.tipo)+'</td><td>'+m.cantidad+'</td><td>'+escHtml(m.fecha)+'</td></tr>'; }).join('');
            } else {
                movBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted small py-3">Sin movimientos</td></tr>';
            }
            var stockBody = document.getElementById('stock-critico-body');
            if (data.stock_critico_data && data.stock_critico_data.length) {
                stockBody.innerHTML = data.stock_critico_data.map(function(p) {
                    return '<tr><td>'+escHtml(p.nombre)+'</td><td><span class="badge '+(p.cantidad<=0?'badge-error':'badge-warning')+'">'+p.cantidad+'</span></td><td>'+p.stock_minimo+'</td></tr>';
                }).join('');
            } else {
                stockBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted small py-3">Stock saludable</td></tr>';
            }
            if (data.meses && data.meses.length) {
                crearEChart('ventasChart', {
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' },
                        formatter: function(params) {
                            var p = params[0];
                            return '<strong>' + p.name + '</strong><br/>Ventas: <strong>$' + p.value.toLocaleString() + '</strong>';
                        }
                    },
                    grid: { left: '3%', right: '4%', bottom: '8%', containLabel: true },
                    xAxis: { type: 'category', data: data.meses, axisLabel: { rotate: 30 } },
                    yAxis: { type: 'value', axisLabel: { formatter: function(v) { return '$' + v.toLocaleString(); } } },
                    series: [{
                        type: 'bar', data: data.ventas_mensuales,
                        itemStyle: { color: '#465FFF', borderRadius: [6,6,0,0] },
                        emphasis: { itemStyle: { color: '#7a5af8' } },
                        animationDuration: 800, animationEasing: 'elasticOut'
                    }]
                });
            } else {
                document.getElementById('ventasChart').innerHTML = '<p class="text-center text-muted py-5">Sin datos de ventas</p>';
            }
            if (data.categorias_nombres && data.categorias_nombres.length) {
                crearEChart('categoriaChart', {
                    tooltip: {
                        trigger: 'item',
                        formatter: function(p) {
                            return '<strong>' + p.name + '</strong><br/>' + p.value + ' productos (' + p.percent.toFixed(1) + '%)';
                        }
                    },
                    legend: { bottom: '0%', textStyle: { fontSize: 11 } },
                    series: [{
                        type: 'pie', radius: ['40%', '70%'], avoidLabelOverlap: true,
                        label: { show: false },
                        emphasis: {
                            label: { show: true, fontSize: 14, fontWeight: 'bold' },
                            itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.2)' }
                        },
                        itemStyle: { borderRadius: 4, borderColor: '#fff', borderWidth: 2 },
                        animationType: 'scale', animationEasing: 'elasticOut',
                        data: data.categorias_nombres.map(function(n, i) {
                            return { name: n, value: data.categorias_count[i], itemStyle: { color: COLORS[i % COLORS.length] } };
                        })
                    }]
                });
            } else {
                document.getElementById('categoriaChart').innerHTML = '<p class="text-center text-muted py-5">Sin categor&iacute;as</p>';
            }
        })
        .catch(function(e) {
            console.error('Dashboard error:', e);
        });
}
cargarDashboard();
</script>
{% endblock %}
