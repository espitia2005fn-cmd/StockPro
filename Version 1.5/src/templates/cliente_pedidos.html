{% extends "base_cliente.html" %}

{% block titulo %}Mis Pedidos{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
    <div>
        <p class="page-subtitle mb-0">Historial completo de tus compras</p>
    </div>
    <a href="/" class="btn btn-primary btn-sm" style="background:var(--gray-600);color:white;border:none;border-radius:50px;">
        <i class="bi bi-cart"></i> Comprar ahora
    </a>
</div>

<div class="table-container">
    <div class="table-header">
        <h5 class="card-title"><i class="bi bi-clock-history me-2" style="color:var(--brand-500);"></i> Mis Pedidos</h5>
    </div>
    <div class="table-wrapper">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Factura</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody id="pedidos-body">
                    <tr><td colspan="5" class="text-center py-4">Cargando pedidos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal detalle pedido -->
<div class="modal fade" id="detalleModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-receipt me-2" style="color:var(--brand-500);"></i>Detalle del Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detalle-body">
                <div class="text-center py-4">Cargando...</div>
            </div>
        </div>
    </div>
</div>

<script>
async function cargarPedidos() {
    try {
        const res = await fetch('/api/cliente/pedidos');
        const data = await res.json();
        
        if (data.pedidos && data.pedidos.length) {
            let html = '';
            for (const pedido of data.pedidos) {
                let cls = pedido.estado === 'pendiente' ? 'warning' : (pedido.estado === 'pagado' ? 'success' : (pedido.estado === 'enviado' ? 'info' : (pedido.estado === 'entregado' ? 'primary' : 'secondary')));
                html += `
                    <tr>
                        <td><strong>${escHtml(pedido.factura)}</strong></td>
                        <td>${escHtml(pedido.fecha)}</td>
                        <td class="fw-bold">$${pedido.total.toLocaleString()}</td>
                        <td><span class="badge bg-${cls}">${escHtml(pedido.estado)}</span></td>
                        <td class="text-end">
                            <button onclick="verDetalle(${pedido.id})" class="btn btn-sm" style="background:var(--gray-600);color:white;border:none;">
                                <i class="bi bi-eye"></i> Ver
                            </button>
                        </td>
                    </tr>
                `;
            }
            document.getElementById('pedidos-body').innerHTML = html;
        } else {
            document.getElementById('pedidos-body').innerHTML = '<tr><td colspan="5" class="text-center py-4">No tienes pedidos a&uacute;n</td></tr>';
        }
    } catch(e) {
        console.error(e);
        document.getElementById('pedidos-body').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error al cargar pedidos</td></tr>';
    }
}

async function verDetalle(id) {
    const body = document.getElementById('detalle-body');
    body.innerHTML = '<div class="text-center py-4"><div class="spinner-border" role="status"></div></div>';
    new bootstrap.Modal('#detalleModal').show();
    try {
        const res = await fetch('/api/pedido_detalle/' + id);
        const data = await res.json();
        if (data.error) { body.innerHTML = '<div class="text-danger text-center py-4">' + data.error + '</div>'; return; }
        let rows = '';
        for (const d of data.detalles) {
            rows += '<tr><td class="text-muted small">' + (d.codigo || '-') + '</td><td>' + d.nombre + '</td><td class="text-center">' + d.cantidad + '</td><td class="text-end">$' + d.precio.toLocaleString() + '</td><td class="text-end fw-bold">$' + d.subtotal.toLocaleString() + '</td></tr>';
        }
        body.innerHTML = `
            <div class="pedido-info-grid mb-3">
                <div class="d-flex gap-2 mb-2"><span class="text-muted small">Subtotal:</span><span class="fw-bold">$${data.subtotal.toLocaleString()}</span></div>
                <div class="d-flex gap-2 mb-2"><span class="text-muted small">IVA:</span><span class="fw-bold">$${data.iva.toLocaleString()}</span></div>
                <div class="d-flex gap-2 mb-3 fs-5"><span class="text-muted small">Total:</span><span class="fw-bold" style="color:var(--error-500);">$${data.total.toLocaleString()}</span></div>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0">
                    <thead><tr><th>C&oacute;digo</th><th>Producto</th><th class="text-center">Cant</th><th class="text-end">Precio</th><th class="text-end">Subtotal</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    } catch(e) {
        body.innerHTML = '<div class="text-danger text-center py-4">Error al cargar detalle</div>';
    }
}

cargarPedidos();
</script>
{% endblock %}
