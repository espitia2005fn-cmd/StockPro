{% extends "base_auth.html" %}

{% block titulo %}Crear Cuenta{% endblock %}

{% block logo_icon %}<i class="bi bi-person-plus-fill"></i>{% endblock %}

{% block subtitulo %}Crea tu cuenta como cliente{% endblock %}

{% block contenido %}
<form method="POST" action="/registro">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-person"></i> Nombre Completo *</label>
        <input type="text" name="nombre" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope"></i> Email *</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-person-badge"></i> Usuario *</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-telephone"></i> Teléfono</label>
        <input type="tel" name="telefono" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-geo-alt"></i> Dirección</label>
        <textarea name="direccion" class="form-control" rows="2"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-lock"></i> Contraseña *</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label"><i class="bi bi-lock"></i> Confirmar Contraseña *</label>
        <input type="password" name="confirm_password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label"><i class="bi bi-shield-lock"></i> Verificaci&oacute;n: &iquest;Cu&aacute;nto es {{ captcha_q }}?</label>
        <input type="text" name="_captcha" class="form-control" placeholder="Escribe la respuesta" required>
    </div>

    <button type="submit" class="btn-brand mb-3">
        <i class="bi bi-check-circle"></i> Crear mi cuenta
    </button>

    <a href="/login" class="btn-outline-brand">
        <i class="bi bi-box-arrow-in-right"></i> &iquest;Ya tienes cuenta? Inicia sesi&oacute;n
    </a>
</form>

<hr>
<div class="text-center">
    <small class="text-muted">Al registrarte aceptas nuestros términos y condiciones</small>
</div>
{% endblock %}
